version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: lat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lat_torneos
      POSTGRES_USER: lat_user
      POSTGRES_PASSWORD: lat_secret
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: lat_adminer
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lat_backend
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lat_torneos
      DB_USER: lat_user
      DB_PASS: lat_secret
      JWT_SECRET: clave_super_secreta_lat_2025
      JWT_EXPIRES: 1h
      PORT: 3000
      NODE_ENV: production
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lat_frontend
    restart: unless-stopped
    ports:
      - 5173:5173
    depends_on:
      - backend

volumes:
  postgres_data: